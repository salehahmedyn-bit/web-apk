name: WebToApp Builder

on:
  repository_dispatch:
    types: [build_event] # النوع الذي سيرسله بوت البايثون

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Inject User Data
        run: |
          # سكريبت بايثون سريع لتعديل الإعدادات قبل البناء
          python3 -c "
          import json, os
          config_path = 'app/src/main/assets/app_config.json'
          data = {
              'app_name': '${{ github.event.client_payload.app_name }}',
              'url': '${{ github.event.client_payload.url }}',
              'package_name': '${{ github.event.client_payload.package_name }}'
          }
          with open(config_path, 'w') as f:
              json.dump(data, f, indent=4)
          print('Config Injected Successfully!')
          "

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build APK
        run: ./gradlew assembleRelease

      - name: Send APK to Telegram
        run: |
          APK_PATH=$(find app/build/outputs/apk/release/ -name "*.apk" | head -n 1)
          curl -v -F "chat_id=${{ github.event.client_payload.chat_id }}" \
               -F "document=@$APK_PATH" \
               -F "caption=✅ تم بناء تطبيقك بنجاح! 🚀" \
               https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendDocument
