name: WebToApp Builder (Signed)

on:
  repository_dispatch:
    types: [build_event]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Decode Keystore
        run: |
          # فك تشفير المفتاح من Secrets وحفظه كملف مؤقت
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > app/release.jks

      - name: Inject User Data
        run: |
          python3 -c "
          import json, os
          os.makedirs('app/src/main/assets', exist_ok=True)
          config_path = 'app/src/main/assets/app_config.json'
          data = {
              'app_name': '${{ github.event.client_payload.app_name }}',
              'url': '${{ github.event.client_payload.url }}',
              'package_name': '${{ github.event.client_payload.package_name }}'
          }
          with open(config_path, 'w') as f:
              json.dump(data, f, indent=4)
          "

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Signed APK
        env:
          KEYSTORE_PATH: release.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleRelease

      - name: Send APK to Telegram
        run: |
          APK_PATH=$(find app/build/outputs/apk/release/ -name "*.apk" | head -n 1)
          curl -v -F "chat_id=${{ github.event.client_payload.chat_id }}" \
               -F "document=@$APK_PATH" \
               -F "caption=✅ تم بناء تطبيقك الرسمي الموقع بنجاح! 🚀" \
               https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendDocument
