name: WebToApp Builder

on:
  repository_dispatch:
    types: [build_event]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Inject User Data
        run: |
          python3 -c "
          import json, os
          # التأكد من وجود المجلد قبل الحقن
          os.makedirs('app/src/main/assets', exist_ok=True)
          config_path = 'app/src/main/assets/app_config.json'
          data = {
              'app_name': '${{ github.event.client_payload.app_name }}',
              'url': '${{ github.event.client_payload.url }}',
              'package_name': '${{ github.event.client_payload.package_name }}'
          }
          with open(config_path, 'w') as f:
              json.dump(data, f, indent=4)
          print('Config Injected Successfully!')
          "

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Send APK to Telegram
        run: |
          # البحث عن ملف الـ APK في مجلد الـ debug
          APK_PATH=$(find app/build/outputs/apk/debug/ -name "*.apk" | head -n 1)
          if [ -z "$APK_PATH" ]; then
            echo "APK not found!"
            exit 1
          fi
          curl -v -F "chat_id=${{ github.event.client_payload.chat_id }}" \
               -F "document=@$APK_PATH" \
               -F "caption=✅ تم بناء تطبيقك (Debug Version) بنجاح! 🚀" \
               https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendDocument
